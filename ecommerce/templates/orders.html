{% extends 'base.html' %}
{% block content %}

<style>
.section-title {
    text-align: center;
    margin-bottom: 30px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.order-id {
    font-size: 18px;
    font-weight: 600;
}

.order-date {
    color: #777;
    font-size: 14px;
    margin: 10px 0;
}

.btn {
    display: inline-block;
    margin-top: 10px;
}

/* EMPTY STATE */
.empty-box {
    text-align: center;
    margin-top: 60px;
}

.empty-box h3 {
    color: #555;
}
</style>

<h1 class="section-title">📦 Your Orders</h1>

<div class="grid">
    {% for order in orders %}
    <div class="card">
        <div class="order-id">Order #{{ order.id }}</div>
        <div class="order-date">
            {{ order.created_at|date:"M d, Y • H:i" }}
        </div>

        <a href="/order/{{ order.id }}/" class="btn">
            View Details →
        </a>
    </div>
    {% empty %}
</div>

<div class="empty-box">
    <h3>No orders yet 😔</h3>
    <a href="/products/" class="btn">Start Shopping</a>
</div>
{% endfor %}

{% endblock %}
