{% extends 'base.html' %}
{% block content %}

<style>
.product-container {
    display: flex;
    gap: 60px;
    flex-wrap: wrap;
    align-items: center;
    padding: 30px;
}

/* IMAGE SECTION */
.product-image {
    flex: 1;
    text-align: center;
}

.product-image img {
    width: 100%;
    max-width: 420px;
    height: 360px;
    object-fit: cover;
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    transition: 0.4s;
}

.product-image img:hover {
    transform: scale(1.05);
}

/* INFO SECTION */
.product-info {
    flex: 1;
}

/* Title */
.product-info h1 {
    font-size: 34px;
    margin-bottom: 10px;
    color: #222;
}

/* Description */
.product-info p {
    color: #555;
    line-height: 1.7;
    margin-bottom: 15px;
}

/* Price */
.price {
    font-size: 32px;
    font-weight: bold;
    color: #2e7d32;
    margin: 20px 0;
}

/* Badge */
.badge {
    display: inline-block;
    background: #ff9800;
    color: white;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    margin-bottom: 10px;
}

/* Buttons */
.actions {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

.btn {
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 16px;
    text-decoration: none;
    transition: 0.3s;
}

/* Add to cart */
.add-btn {
    background: linear-gradient(135deg, #00adb5, #007b80);
    color: white;
}

.add-btn:hover {
    transform: scale(1.07);
}

/* Buy now */
.buy-btn {
    background: #ff5722;
    color: white;
}

.buy-btn:hover {
    transform: scale(1.07);
}

/* Card feel */
.product-box {
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
}
</style>

<div class="product-box">
    <div class="product-container">

        <!-- IMAGE -->
        <div class="product-image">
            {% if product.image %}
                <img src="{{ product.image.url }}">
            {% else %}
                <img src="https://via.placeholder.com/400x300">
            {% endif %}
        </div>

        <!-- INFO -->
        <div class="product-info">

            <span class="badge">🔥 Trending</span>

            <h1>{{ product.name }}</h1>

            <p>{{ product.description }}</p>

            <p class="price">₹{{ product.price }}</p>

            <div class="actions">
                <a href="/cart/add/{{ product.id }}/" class="btn add-btn">
                    🛒 Add to Cart
                </a>

                <a href="/checkout/" class="btn buy-btn">
                    ⚡ Buy Now
                </a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
