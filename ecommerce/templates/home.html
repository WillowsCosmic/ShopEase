{% extends 'base.html' %}

{% block content %}

<style>
    .section-title {
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 25px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 25px;
    }

    .card {
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        transition: all 0.3s ease;
        text-align: center;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-bottom: 1px solid #eee;
    }

    .card-body {
        padding: 15px;
    }

    .card h3 {
        font-size: 18px;
        margin: 10px 0;
        color: #333;
    }

    .price {
        color: #2e7d32;
        font-weight: bold;
        font-size: 16px;
    }

    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 14px;
        background: linear-gradient(135deg, #00adb5, #007b80);
        color: white;
        border-radius: 6px;
        text-decoration: none;
        font-size: 14px;
        transition: 0.3s;
    }

    .btn:hover {
        opacity: 0.9;
    }
</style>

<h2 class="section-title">🛍️ Latest Products</h2>

<div class="grid">
    {% for product in products %}
    <div class="card">

        {% if product.image %}
        <img src="{{ product.image.url }}">
        {% else %}
        <img src="https://via.placeholder.com/300x200?text=No+Image">
        {% endif %}

        <div class="card-body">
            <h3>{{ product.name }}</h3>
            <p class="price">₹{{ product.price }}</p>

            <a href="/product/{{ product.id }}/" class="btn">
                View Details
            </a>
        </div>

    </div>
    {% endfor %}
</div>

{% endblock %}
