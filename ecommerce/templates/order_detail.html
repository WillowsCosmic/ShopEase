{% extends 'base.html' %}
{% block content %}

<style>
.order-title {
    text-align: center;
    margin-bottom: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.total {
    text-align: center;
    font-size: 28px;
    margin-top: 30px;
    font-weight: bold;
}
</style>

<h1 class="order-title">📄 Order #{{ order.id }}</h1>

<div class="grid">
    {% for item in items %}
    <div class="card">
        <h3>{{ item.product.name }}</h3>
        <p>Quantity: {{ item.quantity }}</p>
        <p>₹{{ item.product.price }}</p>
    </div>
    {% endfor %}
</div>

<p class="total">Total: ₹{{ total }}</p>

<a href="/products/" class="btn">Continue Shopping</a>

{% endblock %}
